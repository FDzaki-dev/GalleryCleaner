android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g
# Daemon left ON (the default) — it was previously disabled here, which is
# reasonable for a throwaway CI runner (no benefit reusing a JVM that's
# gone after one job) but actively hurts local development: this same file
# governs Android Studio builds too, and without a daemon every single
# build pays a fresh JVM cold-start + class-loading cost instead of reusing
# a warm one. GitHub Actions' own gradle/actions/setup-gradle step already
# manages the daemon lifecycle safely for CI, so nothing needs to force it
# off globally here.
org.gradle.parallel=true
org.gradle.caching=true
