name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret set — release build will fall back to the debug key."
          fi

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle assembleRelease --stacktrace

      # Gradle always names the raw output file app-release.apk regardless
      # of versionCode/versionName — a generic name is a problem the moment
      # you have more than one build on your phone: nothing on disk says
      # which commit it came from. versionName here is computed the exact
      # same way build.gradle.kts computes it (git commit count), so the
      # file name on disk always matches what Settings/About would show
      # once installed.
      - name: Rename APK to match this commit's version
        run: |
          VERSION_NAME="1.0.$(git rev-list --count HEAD)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          OUT_NAME="GalleryCleaner-v${VERSION_NAME}-${SHORT_SHA}.apk"
          echo "OUT_NAME=$OUT_NAME" >> "$GITHUB_ENV"
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/$OUT_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUT_NAME }}
          path: app/build/outputs/apk/release/${{ env.OUT_NAME }}
